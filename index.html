<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Double Pendulum</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            cursor: grab;
        }
        body:active { cursor: grabbing; }
        canvas { display: block; }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0,255,255,0.3);
            backdrop-filter: blur(5px);
            z-index: 100;
            user-select: none;
            width: 220px;
        }
        .controls h2 {
            margin-bottom: 12px;
            font-size: 16px;
            color: #f0f;
            text-shadow: 0 0 10px #f0f;
        }
        .control-group {
            margin-bottom: 10px;
        }
        .control-group label {
            display: block;
            font-size: 10px;
            color: #ff0;
            margin-bottom: 4px;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #0ff;
        }
        .value-display {
            float: right;
            color: #fff;
            font-weight: bold;
            font-size: 11px;
        }
        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(0,255,255,0.1);
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }
        .stats {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(0,255,0,0.3);
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
            text-align: center;
            max-width: 500px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>🌀 NEON DOUBLE PENDULUM</h2>

        <div class="control-group">
            <label>Mass 1 <span class="value-display" id="m1Val">1.0</span></label>
            <input type="range" id="mass1" min="0.5" max="3" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label>Mass 2 <span class="value-display" id="m2Val">1.0</span></label>
            <input type="range" id="mass2" min="0.5" max="3" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label>Length 1 <span class="value-display" id="l1Val">120</span></label>
            <input type="range" id="len1" min="50" max="200" value="120">
        </div>

        <div class="control-group">
            <label>Length 2 <span class="value-display" id="l2Val">120</span></label>
            <input type="range" id="len2" min="50" max="200" value="120">
        </div>

        <div class="control-group">
            <label>Gravity <span class="value-display" id="gVal">1.00</span></label>
            <input type="range" id="gravity" min="0.2" max="2" step="0.05" value="1">
        </div>

        <div class="control-group">
            <label>Friction <span class="value-display" id="fricVal">0.00</span></label>
            <input type="range" id="friction" min="0" max="0.05" step="0.001" value="0">
        </div>

        <div class="control-group">
            <label>Trail Fade <span class="value-display" id="fadeVal">0.02</span></label>
            <input type="range" id="fade" min="0.001" max="0.2" step="0.001" value="0.02">
        </div>

        <div class="buttons">
            <button id="resetBtn">Reset</button>
            <button id="randomBtn">Randomize</button>
        </div>
    </div>

    <div class="stats">
        <div>Energy: <span id="energy">--</span></div>
        <div>FPS: <span id="fps">60</span></div>
    </div>

    <div class="instructions">
        Drag anywhere to set initial angle and release; the second pendulum follows. Watch chaotic paths unfold. Adjust masses/lengths/gravity/friction for new behaviors.
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Controls
        const m1Slider = document.getElementById('mass1');
        const m2Slider = document.getElementById('mass2');
        const l1Slider = document.getElementById('len1');
        const l2Slider = document.getElementById('len2');
        const gSlider = document.getElementById('gravity');
        const fricSlider = document.getElementById('friction');
        const fadeSlider = document.getElementById('fade');
        const resetBtn = document.getElementById('resetBtn');
        const randomBtn = document.getElementById('randomBtn');

        let width, height;
        let running = false;
        let t = 0;
        let dt = 0.016;
        let lastTime = 0;
        let frameCount = 0;
        let lastFpsTime = 0;
        let trail = [];

        // State: [θ1, θ2, ω1, ω2]
        let state = [Math.PI/2, Math.PI/2, 0, 0];
        let targetAngle = Math.PI/2; // for dragging first arm
        let isDragging = false;

        // Physical parameters
        let m1 = 1, m2 = 1, L1 = 120, L2 = 120, g = 1, friction = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Equations of motion for double pendulum (derived from Lagrangian)
        function computeDerivs(state) {
            let [θ1, θ2, ω1, ω2] = state;
            let Δ = θ2 - θ1;

            let den1 = (m1 + m2) * L1 - m2 * L1 * Math.cos(Δ) * Math.cos(Δ);
            let den2 = (L2 / L1) * den1;

            let num1 = -m2 * L1 * ω1 * ω1 * Math.sin(Δ) * Math.cos(Δ)
                     + m2 * g * Math.sin(θ2) * Math.cos(Δ)
                     + m2 * L2 * ω2 * ω2 * Math.sin(Δ)
                     - (m1 + m2) * g * Math.sin(θ1);

            let num2 = -m2 * L2 * ω2 * ω2 * Math.sin(Δ) * Math.cos(Δ)
                     + (m1 + m2) * g * Math.sin(θ1) * Math.cos(Δ)
                     - (m1 + m2) * L1 * ω1 * ω1 * Math.sin(Δ)
                     - (m1 + m2) * g * Math.sin(θ2);

            let α1 = num1 / den1;
            let α2 = num2 / den2;

            // Apply friction (proportional to angular velocity)
            α1 -= friction * ω1;
            α2 -= friction * ω2;

            return [ω1, ω2, α1, α2];
        }

        function getBobPositions(state) {
            let [θ1, θ2] = state;
            let x1 = width/2 + L1 * Math.sin(θ1);
            let y1 = height/3 + L1 * Math.cos(θ1);
            let x2 = x1 + L2 * Math.sin(θ2);
            let y2 = y1 + L2 * Math.cos(θ2);
            return [{x: x1, y: y1}, {x: x2, y: y2}];
        }

        function energy(state) {
            let [θ1, θ2, ω1, ω2] = state;
            let [p1, p2] = getBobPositions(state);
            // Kinetic
            let v1x = L1 * ω1 * Math.cos(θ1);
            let v1y = L1 * ω1 * Math.sin(θ1);
            let v2x = v1x + L2 * ω2 * Math.cos(θ2);
            let v2y = v1y + L2 * ω2 * Math.sin(θ2);
            let KE = 0.5*m1*(v1x*v1x+v1y*v1y) + 0.5*m2*(v2x*v2x+v2y*v2y);
            // Potential (y grows downward, so negative for height)
            let PE = -(m1 * g * p1.y + m2 * g * p2.y);
            return KE + PE;
        }

        function updatePhys(dt) {
            // RK4 integration
            let k1 = computeDerivs(state);
            let k2 = computeDerivs([state[0]+0.5*dt*k1[0], state[1]+0.5*dt*k1[1], state[2]+0.5*dt*k1[2], state[3]+0.5*dt*k1[3]]);
            let k3 = computeDerivs([state[0]+0.5*dt*k2[0], state[1]+0.5*dt*k2[1], state[2]+0.5*dt*k2[2], state[3]+0.5*dt*k2[3]]);
            let k4 = computeDerivs([state[0]+dt*k3[0], state[1]+dt*k3[1], state[2]+dt*k3[2], state[3]+dt*k3[3]]);

            state[0] += dt/6 * (k1[0] + 2*k2[0] + 2*k3[0] + k4[0]);
            state[1] += dt/6 * (k1[1] + 2*k2[1] + 2*k3[1] + k4[1]);
            state[2] += dt/6 * (k1[2] + 2*k2[2] + 2*k3[2] + k4[2]);
            state[3] += dt/6 * (k1[3] + 2*k2[3] + 2*k3[3] + k4[3]);
        }

        function draw() {
            const fade = parseFloat(fadeSlider.value);
            ctx.fillStyle = `rgba(0, 0, 0, ${fade})`;
            ctx.fillRect(0, 0, width, height);

            // Draw trail
            if (trail.length > 1) {
                ctx.beginPath();
                ctx.moveTo(trail[0].x, trail[0].y);
                for (let i = 1; i < trail.length; i++) {
                    ctx.lineTo(trail[i].x, trail[i].y);
                }
                ctx.strokeStyle = 'hsla(180, 100%, 60%, 0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            const pos = getBobPositions(state);
            const pivot = {x: width/2, y: height/3};

            // Draw arms
            ctx.beginPath();
            ctx.moveTo(pivot.x, pivot.y);
            ctx.lineTo(pos[0].x, pos[0].y);
            ctx.strokeStyle = 'rgba(0,255,255,0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(pos[0].x, pos[0].y);
            ctx.lineTo(pos[1].x, pos[1].y);
            ctx.strokeStyle = 'rgba(255,0,255,0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw bobs with glow
            [pos[0], pos[1]].forEach((p, i) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, i===0 ? 10 : 14, 0, Math.PI*2);
                ctx.fillStyle = i===0 ? '#0ff' : '#f0f';
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Pivot
            ctx.beginPath();
            ctx.arc(pivot.x, pivot.y, 5, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#fff';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Energy
            document.getElementById('energy').textContent = energy(state).toFixed(1);
        }

        function animate(timestamp) {
            const delta = timestamp - lastTime || 16;
            lastTime = timestamp;

            frameCount++;
            if (timestamp - lastFpsTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastFpsTime = timestamp;
            }

            if (running && !isDragging) {
                // Fixed timestep for stability
                const steps = Math.ceil(delta / 16);
                for (let i = 0; i < steps; i++) {
                    updatePhys(dt);
                }
                t += delta * 0.001;
            }

            draw();
            requestAnimationFrame(animate);
        }

        // Drag handling: set θ1 to angle from pivot to mouse
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateTargetAngle(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                updateTargetAngle(e.clientX, e.clientY);
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                // We keep the current state (θ1 set to target, θ2 follows)
                // Give it a tiny kick to start motion
                state[2] = 0;
                state[3] = 0;
                running = true;
            }
        });

        function updateTargetAngle(x, y) {
            const pivot = {x: width/2, y: height/3};
            targetAngle = Math.atan2(x - pivot.x, y - pivot.y);
            state[0] = targetAngle;
            // Keep θ2 close to θ1 initially for stability
            state[1] = targetAngle + (state[1] - state[0]) * 0.5;
            // Reset trail
            trail = [];
        }

        // UI updates
        function updateDisplays() {
            document.getElementById('m1Val').textContent = m1Slider.value;
            document.getElementById('m2Val').textContent = m2Slider.value;
            document.getElementById('l1Val').textContent = l1Slider.value;
            document.getElementById('l2Val').textContent = l2Slider.value;
            document.getElementById('gVal').textContent = parseFloat(gSlider.value).toFixed(2);
            document.getElementById('fricVal').textContent = fricSlider.value;
            document.getElementById('fadeVal').textContent = fadeSlider.value;
        }

        const sliders = [m1Slider, m2Slider, l1Slider, l2Slider, gSlider, fricSlider, fadeSlider];
        sliders.forEach(s => s.addEventListener('input', () => {
            updateDisplays();
            m1 = parseFloat(m1Slider.value);
            m2 = parseFloat(m2Slider.value);
            L1 = parseInt(l1Slider.value);
            L2 = parseInt(l2Slider.value);
            g = parseFloat(gSlider.value);
            friction = parseFloat(fricSlider.value);
        }));

        resetBtn.addEventListener('click', () => {
            state = [Math.PI/2, Math.PI/2, 0, 0];
            trail = [];
            running = false;
        });

        randomBtn.addEventListener('click', () => {
            m1Slider.value = (0.5 + Math.random()*2.5).toFixed(1);
            m2Slider.value = (0.5 + Math.random()*2.5).toFixed(1);
            l1Slider.value = Math.floor(50 + Math.random()*150);
            l2Slider.value = Math.floor(50 + Math.random()*150);
            gSlider.value = (0.2 + Math.random()*1.8).toFixed(2);
            fricSlider.value = (Math.random()*0.05).toFixed(3);
            fadeSlider.value = (0.001 + Math.random()*0.099).toFixed(3);
            updateDisplays();
            m1 = parseFloat(m1Slider.value); m2 = parseFloat(m2Slider.value);
            L1 = parseInt(l1Slider.value); L2 = parseInt(l2Slider.value);
            g = parseFloat(gSlider.value); friction = parseFloat(fricSlider.value);
            state = [Math.PI/2, Math.PI/2, 0, 0];
            trail = [];
            running = false;
        });

        // Track end bob position for trail
        function updateTrail() {
            const pos = getBobPositions(state);
            trail.push({x: pos[1].x, y: pos[1].y});
            if (trail.length > 500) trail.shift();
        }

        // Hook into animate
        const origAnimate = animate;
        animate = function(timestamp) {
            updateTrail();
            origAnimate(timestamp);
        };

        updateDisplays();
        animate(0);
    </script>
</body>
</html>
